<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>POSSIBLE COFFEE タリー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     POSSIBLE COFFEE タリー - iOS-inspired Design System
     ============================================================ */

  :root {
    /* Colors — iOS-style systemized palette with POSSIBLE warmth */
    --bg-primary: #F2EFEA;
    --bg-secondary: #FBF9F5;
    --bg-grouped: #EDE8E0;
    --bg-elevated: #FFFFFF;
    --bg-glass: rgba(251, 249, 245, 0.72);

    --label-primary: #1C1A17;
    --label-secondary: rgba(28, 26, 23, 0.6);
    --label-tertiary: rgba(28, 26, 23, 0.3);
    --label-quaternary: rgba(28, 26, 23, 0.15);

    --fill-primary: rgba(120, 105, 85, 0.14);
    --fill-secondary: rgba(120, 105, 85, 0.08);
    --fill-tertiary: rgba(120, 105, 85, 0.05);

    --separator: rgba(60, 50, 40, 0.08);
    --separator-opaque: #E6E0D5;

    --accent: #1C1A17;
    --accent-soft: #3D3832;
    --accent-warm: #6B4E2E;

    --green: #30A46C;
    --orange: #E8A23D;
    --red: #D9614E;

    /* Depth — layered soft shadows */
    --shadow-xs: 0 1px 2px rgba(28, 26, 23, 0.04);
    --shadow-sm: 0 1px 3px rgba(28, 26, 23, 0.05), 0 1px 2px rgba(28, 26, 23, 0.03);
    --shadow-md: 0 4px 12px rgba(28, 26, 23, 0.06), 0 1px 3px rgba(28, 26, 23, 0.04);
    --shadow-lg: 0 10px 32px rgba(28, 26, 23, 0.08), 0 4px 12px rgba(28, 26, 23, 0.05);
    --shadow-xl: 0 20px 50px rgba(28, 26, 23, 0.12), 0 8px 20px rgba(28, 26, 23, 0.06);

    /* Radii */
    --r-xs: 8px;
    --r-sm: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 28px;
    --r-full: 999px;

    /* Motion */
    --ease-ios: cubic-bezier(0.28, 0.11, 0.32, 1);
    --ease-ios-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
                 "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
    font-feature-settings: "ss01", "cv01", "cv11";
    letter-spacing: -0.01em;
    color: var(--label-primary);
    background: #1a0f08;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }

  /* ============================================================
     Phone frame
     ============================================================ */
  .phone-frame {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    height: 100dvh; /* dynamic viewport for mobile browsers */
    max-height: 100vh;
    max-height: 100dvh;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    padding-top: env(safe-area-inset-top);
  }

  /* Ambient warm glow — extremely subtle */
  .phone-frame::before {
    content: '';
    position: absolute;
    top: -120px;
    left: -60px;
    width: 340px;
    height: 340px;
    background: radial-gradient(circle, rgba(215, 170, 110, 0.15), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .phone-frame::after {
    content: '';
    position: absolute;
    bottom: -140px;
    right: -80px;
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(139, 100, 60, 0.12), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  @media (min-width: 500px) {
    .phone-frame {
      max-height: 900px;
      border-radius: 44px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4),
                  0 16px 32px rgba(0, 0, 0, 0.25),
                  inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      margin: 20px 0;
      padding-top: 0;
    }
  }

  /* ============================================================
     Status bar (top, translucent)
     ============================================================ */
  .status-bar {
    position: relative;
    z-index: 10;
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--bg-glass);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
    flex-shrink: 0;
  }

  .menu-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--r-full);
    border: none;
    background: var(--fill-secondary);
    color: var(--label-primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s var(--ease-ios);
  }
  .menu-btn:active {
    background: var(--fill-primary);
    transform: scale(0.92);
  }

  .stat-center {
    text-align: center;
    flex: 1;
    min-width: 0;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--label-secondary);
    letter-spacing: 0.2px;
    margin-bottom: 1px;
  }
  .stat-value {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    font-variant-numeric: tabular-nums;
  }
  .stat-value span { font-weight: 700; }

  .sync-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px 6px 8px;
    border-radius: var(--r-full);
    background: var(--fill-secondary);
    font-size: 11px;
    font-weight: 500;
    color: var(--label-primary);
    flex-shrink: 0;
    white-space: nowrap;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: background 0.15s;
  }
  .sync-badge:active { background: var(--fill-primary); }
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: var(--r-full);
    background: var(--green);
    box-shadow: 0 0 0 0 currentColor;
    animation: dotPulse 2.6s ease-out infinite;
  }
  @keyframes dotPulse {
    0% { box-shadow: 0 0 0 0 rgba(48, 164, 108, 0.5); }
    80% { box-shadow: 0 0 0 6px rgba(48, 164, 108, 0); }
    100% { box-shadow: 0 0 0 0 rgba(48, 164, 108, 0); }
  }

  /* ============================================================
     Menu overlay (sheet from top)
     ============================================================ */
  .menu-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(28, 26, 23, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 30;
    display: none;
    opacity: 0;
    transition: opacity 0.25s var(--ease-ios);
  }
  .menu-overlay.open { display: block; opacity: 1; }
  .menu-panel {
    position: absolute;
    top: 8px;
    left: 12px;
    right: 12px;
    background: var(--bg-elevated);
    padding: 18px;
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    animation: menuSlide 0.35s var(--ease-ios-out);
  }
  @keyframes menuSlide {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .menu-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--label-tertiary);
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .recorder-group {
    display: flex;
    gap: 6px;
    padding: 3px;
    background: var(--fill-secondary);
    border-radius: var(--r-sm);
    margin-bottom: 16px;
  }
  .recorder-btn {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: calc(var(--r-sm) - 3px);
    background: transparent;
    color: var(--label-secondary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s var(--ease-ios);
  }
  .recorder-btn.active {
    background: var(--bg-elevated);
    color: var(--label-primary);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
  }

  .end-btn {
    width: 100%;
    padding: 13px;
    background: var(--fill-secondary);
    border: none;
    border-radius: var(--r-sm);
    color: var(--label-primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.18s var(--ease-ios);
  }
  .end-btn:active { background: var(--fill-primary); }
  .menu-close {
    width: 100%;
    padding: 12px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--label-secondary);
    cursor: pointer;
    margin-top: 4px;
  }

  /* ============================================================
     Product grid
     ============================================================ */
  .products {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    position: relative;
    z-index: 1;
    -webkit-overflow-scrolling: touch;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--label-tertiary);
    padding: 0 4px 8px;
  }
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .product-btn {
    position: relative;
    height: 80px;
    background: var(--bg-elevated);
    border: none;
    border-radius: var(--r-md);
    color: var(--label-primary);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.2px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.22s var(--ease-ios);
    overflow: hidden;
    padding: 0 8px;
  }
  .product-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent 40%);
    pointer-events: none;
    opacity: 0.6;
  }
  .product-btn:active {
    transform: scale(0.96);
    box-shadow: var(--shadow-xs);
  }
  .product-btn.in-cart {
    background: var(--accent);
    color: #FFFFFF;
    box-shadow: 0 8px 20px rgba(28, 26, 23, 0.25), 0 2px 6px rgba(28, 26, 23, 0.15);
    font-weight: 600;
  }
  .product-btn.in-cart::before {
    background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 40%);
  }
  .qty-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    border-radius: var(--r-full);
    background: #FFFFFF;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    animation: badgePop 0.3s var(--ease-ios-out);
  }
  @keyframes badgePop {
    0% { transform: scale(0); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* ============================================================
     Cart
     ============================================================ */
  .cart-section {
    position: relative;
    z-index: 1;
    padding: 0 14px;
    flex-shrink: 0;
  }
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 4px 8px;
  }
  .cart-recorder {
    font-size: 11px;
    color: var(--label-tertiary);
    letter-spacing: 0.2px;
  }
  .cart-empty {
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--label-tertiary);
    background: var(--fill-tertiary);
    border-radius: var(--r-md);
  }
  .cart-items {
    max-height: 130px;
    overflow-y: auto;
    background: var(--bg-elevated);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-sm);
    -webkit-overflow-scrolling: touch;
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--separator);
    animation: rowIn 0.25s var(--ease-ios-out);
  }
  .cart-item:last-child { border-bottom: none; }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .cart-item-name {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: var(--label-primary);
    letter-spacing: -0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--r-full);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    font-weight: 500;
    transition: all 0.15s var(--ease-ios);
  }
  .qty-btn:active { transform: scale(0.88); }
  .qty-btn.minus {
    background: var(--fill-secondary);
    color: var(--label-primary);
  }
  .qty-btn.plus {
    background: var(--accent);
    color: #FFFFFF;
  }
  .qty-display {
    min-width: 24px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--label-primary);
  }
  .remove-btn {
    width: 30px;
    height: 30px;
    border-radius: var(--r-full);
    border: none;
    background: transparent;
    color: var(--label-tertiary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 300;
    transition: color 0.15s;
  }
  .remove-btn:active { color: var(--red); }

  /* ============================================================
     Recent records
     ============================================================ */
  .recent-section {
    position: relative;
    z-index: 1;
    padding: 6px 14px 0;
    flex-shrink: 0;
  }
  .recent-toggle {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    background: var(--fill-tertiary);
    border: none;
    border-radius: var(--r-sm);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    color: var(--label-secondary);
    cursor: pointer;
    transition: background 0.15s;
  }
  .recent-toggle:active { background: var(--fill-secondary); }
  .chevron {
    font-size: 10px;
    color: var(--label-tertiary);
    transition: transform 0.25s var(--ease-ios);
  }
  .chevron.expanded { transform: rotate(180deg); }

  .recent-list {
    display: none;
    padding: 8px 0 0;
    max-height: 140px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .recent-list.open { display: block; }
  .recent-item {
    background: var(--bg-elevated);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    box-shadow: var(--shadow-xs);
    transition: all 0.18s var(--ease-ios);
  }
  .recent-item:active {
    transform: scale(0.98);
    background: var(--fill-tertiary);
  }
  .recent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }
  .recent-time {
    font-size: 11px;
    font-weight: 500;
    color: var(--label-secondary);
    font-variant-numeric: tabular-nums;
  }
  .recent-hint {
    font-size: 10px;
    color: var(--label-tertiary);
  }
  .recent-items-text {
    font-size: 13px;
    color: var(--label-primary);
    letter-spacing: -0.1px;
  }

  /* ============================================================
     Record button
     ============================================================ */
  .record-section {
    position: relative;
    z-index: 1;
    padding: 12px 14px 12px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  .record-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: var(--r-md);
    background: var(--accent);
    color: #FFFFFF;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(28, 26, 23, 0.25), 0 2px 6px rgba(28, 26, 23, 0.15);
    transition: all 0.2s var(--ease-ios);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .record-btn:active:not(:disabled) {
    transform: scale(0.98) translateY(1px);
    box-shadow: 0 4px 12px rgba(28, 26, 23, 0.2), 0 1px 3px rgba(28, 26, 23, 0.15);
  }
  .record-btn:disabled {
    background: var(--fill-primary);
    color: var(--label-tertiary);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ============================================================
     Snackbar
     ============================================================ */
  .snackbar {
    position: absolute;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--accent);
    color: #FFFFFF;
    padding: 11px 18px;
    border-radius: var(--r-full);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.1px;
    box-shadow: var(--shadow-xl);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s var(--ease-ios-out);
    white-space: nowrap;
  }
  .snackbar.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .snackbar.error {
    background: var(--red);
    box-shadow: 0 12px 32px rgba(217, 97, 78, 0.4), var(--shadow-lg);
    white-space: normal;
    text-align: center;
    max-width: calc(100% - 32px);
  }

  /* ============================================================
     Admin screen
     ============================================================ */
  .admin-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary);
    z-index: 50;
    display: none;
    flex-direction: column;
    animation: slideUp 0.35s var(--ease-ios-out);
  }
  .admin-screen.open { display: flex; }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .admin-header {
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-glass);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--separator);
    flex-shrink: 0;
  }
  .admin-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .admin-close-btn {
    background: var(--fill-secondary);
    border: none;
    color: var(--label-primary);
    width: 36px;
    height: 36px;
    border-radius: var(--r-full);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s var(--ease-ios);
  }
  .admin-close-btn:active {
    background: var(--fill-primary);
    transform: scale(0.92);
  }
  .admin-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .admin-list-empty {
    padding: 50px 20px;
    text-align: center;
    color: var(--label-tertiary);
    font-size: 14px;
    line-height: 1.6;
  }
  .admin-item {
    background: var(--bg-elevated);
    border-radius: var(--r-md);
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    transition: opacity 0.2s;
  }
  .admin-item.inactive { opacity: 0.5; }

  .reorder-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .reorder-btn {
    width: 28px;
    height: 22px;
    border: none;
    background: var(--fill-secondary);
    border-radius: 6px;
    font-size: 9px;
    cursor: pointer;
    color: var(--label-primary);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .reorder-btn:disabled { opacity: 0.25; }
  .reorder-btn:active:not(:disabled) {
    background: var(--fill-primary);
    transform: scale(0.92);
  }

  .admin-item-body {
    flex: 1;
    min-width: 0;
  }
  .admin-item-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--label-primary);
    letter-spacing: -0.2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .toggle-switch {
    width: 44px;
    height: 26px;
    border-radius: var(--r-full);
    background: var(--label-quaternary);
    position: relative;
    cursor: pointer;
    border: none;
    flex-shrink: 0;
    transition: background 0.25s var(--ease-ios);
  }
  .toggle-switch.on { background: var(--green); }

<script>
  // ==========================================================
  // POSSIBLE COFFEE タリー - フロントエンド(本番版 v1.0)
  // ==========================================================

  // GAS バックエンドURL
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6yAL-hn4YLQkiCy9iDk84TTPjVHAVSm__8WIPAOMqSyvb_zOKsayT2s6b9v-vSBE/exec';

  // localStorage キー
  const LS = {
    PRODUCTS: 'tally.products',
    RECORDERS: 'tally.recorders',
    RECENT: 'tally.recent',
    RECENT_DATE: 'tally.recent_date',
    RECORDER: 'tally.recorder',
    DEVICE_ID: 'tally.device_id',
  };

  // --- ユーティリティ ---
  function getDeviceId() {
    let id = localStorage.getItem(LS.DEVICE_ID);
    if (!id) {
      id = 'd_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 6);
      localStorage.setItem(LS.DEVICE_ID, id);
    }
    return id;
  }
  function generateId(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
  }
  function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  // --- JSONP呼び出し ---
  let jsonpCounter = 0;
  function jsonpCall(action, params, timeout) {
    params = params || {};
    timeout = timeout || 15000;
    return new Promise((resolve, reject) => {
      const callbackName = '__jsonp_cb_' + (jsonpCounter++) + '_' + Date.now();
      const urlParams = new URLSearchParams();
      urlParams.set('action', action);
      urlParams.set('callback', callbackName);
      Object.keys(params).forEach(k => {
        const v = params[k];
        urlParams.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
      });
      const url = GAS_URL + '?' + urlParams.toString();
      const script = document.createElement('script');
      let timeoutId;
      function cleanup() {
        clearTimeout(timeoutId);
        try { delete window[callbackName]; } catch(e) { window[callbackName] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      timeoutId = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout);
      window[callbackName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('network_error')); };
      script.src = url;
      document.head.appendChild(script);
    });
  }

  // --- 永続化 ---
  function loadProducts() {
    try { return JSON.parse(localStorage.getItem(LS.PRODUCTS) || '[]'); }
    catch(e) { return []; }
  }
  function saveProducts(products) { localStorage.setItem(LS.PRODUCTS, JSON.stringify(products)); }

  function loadRecorders() {
    try {
      const cached = JSON.parse(localStorage.getItem(LS.RECORDERS) || 'null');
      if (Array.isArray(cached) && cached.length > 0) return cached;
    } catch(e) {}
    // キャッシュがなければデフォルト
    return [
      { id: 'r1', name: 'Yuki', display_order: 1, active: true },
      { id: 'r2', name: 'パートナー', display_order: 2, active: true },
    ];
  }
  function saveRecorders(recorders) { localStorage.setItem(LS.RECORDERS, JSON.stringify(recorders)); }

  function loadRecent() {
    const today = getTodayStr();
    const savedDate = localStorage.getItem(LS.RECENT_DATE);
    if (savedDate !== today) {
      localStorage.setItem(LS.RECENT_DATE, today);
      localStorage.setItem(LS.RECENT, '[]');
      return [];
    }
    try { return JSON.parse(localStorage.getItem(LS.RECENT) || '[]'); }
    catch(e) { return []; }
  }
  function saveRecent(baskets) {
    localStorage.setItem(LS.RECENT, JSON.stringify(baskets));
    localStorage.setItem(LS.RECENT_DATE, getTodayStr());
  }
  function loadRecorder() { return localStorage.getItem(LS.RECORDER) || 'Yuki'; }
  function saveRecorder(r) { localStorage.setItem(LS.RECORDER, r); }

  // ==========================================================
  // 即時送信(同期キューなし)
  // 成功すれば呼び出し側は何もしない、失敗すれば例外を投げる
  // ==========================================================
  async function sendToServer(action, params) {
    if (!navigator.onLine) {
      throw new Error('オフラインです');
    }
    const res = await jsonpCall(action, params);
    if (!res || !res.ok) {
      throw new Error(res && res.error ? res.error : '送信失敗');
    }
    return res;
  }

  function updateSyncStatus() {
    const dot = document.querySelector('.sync-dot');
    const label = document.querySelector('.sync-label');
    if (!dot || !label) return;
    if (!navigator.onLine) {
      dot.style.background = '#C05B3F';
      label.textContent = 'オフライン';
    } else {
      dot.style.background = '#7A9B6E';
      label.textContent = 'オンライン';
    }
  }

  // ==========================================================
  // State
  // ==========================================================
  let PRODUCTS = loadProducts();
  let RECORDERS = loadRecorders();
  let cart = [];
  let recentBaskets = loadRecent();
  let recorder = loadRecorder();
  let recentExpanded = false;
  let editingProductId = null;
  let editingRecorderId = null;
  let editingBasket = null;

  // ==========================================================
  // レンダリング
  // ==========================================================
  function renderProducts() {
    const grid = document.getElementById('productGrid');
    const activeProducts = PRODUCTS.filter(p => p.active);
    if (activeProducts.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; padding:20px; text-align:center; color:#b0a090; font-size:13px;">商品が読み込まれていません<br>メニュー → 商品管理から確認してください</div>';
      return;
    }
    grid.innerHTML = activeProducts.map(p => {
      const inCart = cart.find(c => c.id === p.id);
      return '<button class="product-btn ' + (inCart ? 'in-cart' : '') + '" data-id="' + p.id + '">' +
        p.name +
        (inCart ? '<span class="qty-badge">' + inCart.qty + '</span>' : '') +
        '</button>';
    }).join('');
    grid.querySelectorAll('.product-btn').forEach(btn => {
      btn.addEventListener('click', () => addToCart(btn.dataset.id));
    });
  }

  function renderCart() {
    const body = document.getElementById('cartBody');
    const countLabel = document.getElementById('cartCountLabel');
    const recordBtn = document.getElementById('recordBtn');
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    if (cart.length === 0) {
      body.innerHTML = '<div class="cart-empty">商品をタップしてカートに追加</div>';
      countLabel.textContent = '';
      recordBtn.disabled = true;
      recordBtn.textContent = '記録';
    } else {
      countLabel.textContent = '(' + totalQty + '点)';
      body.innerHTML = '<div class="cart-items">' + cart.map(item =>
        '<div class="cart-item">' +
          '<div class="cart-item-name">' + item.name + '</div>' +
          '<button class="qty-btn minus" data-action="minus" data-id="' + item.id + '">−</button>' +
          '<div class="qty-display">' + item.qty + '</div>' +
          '<button class="qty-btn plus" data-action="plus" data-id="' + item.id + '">+</button>' +
          '<button class="remove-btn" data-action="remove" data-id="' + item.id + '">×</button>' +
        '</div>'
      ).join('') + '</div>';
      body.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => handleCartAction(btn.dataset.action, btn.dataset.id));
      });
      recordBtn.disabled = false;
      recordBtn.textContent = '✓ 記録 (' + totalQty + '点)';
    }
  }

  function renderRecent() {
    const list = document.getElementById('recentList');
    const countLabel = document.getElementById('recentCountLabel');
    const chevron = document.getElementById('recentChevron');
    countLabel.textContent = '(' + recentBaskets.length + ')';
    list.innerHTML = recentBaskets.slice(0, 10).map(b =>
      '<div class="recent-item" data-id="' + b.basketId + '">' +
        '<div class="recent-header">' +
          '<div class="recent-time">' + b.time + ' · ' + b.recorder + '</div>' +
          '<div class="recent-hint">タップで編集</div>' +
        '</div>' +
        '<div class="recent-items-text">' +
          b.items.map(i => i.name + ' ×' + i.qty).join(' · ') +
        '</div>' +
      '</div>'
    ).join('');
    list.querySelectorAll('.recent-item').forEach(item => {
      item.addEventListener('click', () => openBasketEditModal(item.dataset.id));
    });
    list.classList.toggle('open', recentExpanded);
    chevron.classList.toggle('expanded', !recentExpanded);
  }

  function renderStatus() {
    const now = new Date();
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    document.getElementById('dateLabel').textContent = (now.getMonth() + 1) + '/' + now.getDate() + '(' + days[now.getDay()] + ')';
    const totalItems = recentBaskets.reduce((sum, b) => sum + b.items.reduce((s, i) => s + i.qty, 0), 0);
    document.getElementById('itemCount').textContent = totalItems;
    updateSyncStatus();
  }

  function renderRecorderButtons() {
    const group = document.getElementById('recorderGroup');
    const active = RECORDERS.filter(r => r.active);

    // 現在のrecorderがactiveにいなければ、activeの先頭に切替
    if (active.length > 0 && !active.find(r => r.name === recorder)) {
      recorder = active[0].name;
      saveRecorder(recorder);
    }

    // カート側のラベル更新
    const recorderLabelEl = document.getElementById('recorderLabel');
    if (recorderLabelEl) recorderLabelEl.textContent = recorder;

    if (active.length === 0) {
      group.innerHTML = '<div style="padding:10px; text-align:center; color:var(--label-tertiary); font-size:12px;">記録者が登録されていません</div>';
      return;
    }

    group.innerHTML = active.map(r =>
      '<button class="recorder-btn ' + (r.name === recorder ? 'active' : '') + '" data-recorder="' + r.name + '">' +
        r.name +
      '</button>'
    ).join('');
    group.querySelectorAll('.recorder-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        recorder = btn.dataset.recorder;
        saveRecorder(recorder);
        renderRecorderButtons();
        setTimeout(() => document.getElementById('menuOverlay').classList.remove('open'), 200);
      });
    });
  }

  function renderAll() {
    renderProducts();
    renderCart();
    renderRecent();
    renderStatus();
    renderRecorderButtons();
  }

  // ==========================================================
  // カート操作
  // ==========================================================
  function addToCart(productId) {
    const product = PRODUCTS.find(p => p.id === productId);
    if (!product) return;
    const existing = cart.find(c => c.id === productId);
    if (existing) existing.qty += 1;
    else cart.push({ id: product.id, name: product.name, qty: 1 });
    renderProducts();
    renderCart();
  }

  function handleCartAction(action, productId) {
    if (action === 'plus') {
      const item = cart.find(c => c.id === productId);
      if (item) item.qty += 1;
    } else if (action === 'minus') {
      const item = cart.find(c => c.id === productId);
      if (item) {
        item.qty -= 1;
        if (item.qty <= 0) cart = cart.filter(c => c.id !== productId);
      }
    } else if (action === 'remove') {
      cart = cart.filter(c => c.id !== productId);
    }
    renderProducts();
    renderCart();
  }

  // ==========================================================
  // basket確定(即時送信)
  // ==========================================================
  async function confirmBasket() {
    if (cart.length === 0) return;
    const recordBtn = document.getElementById('recordBtn');
    if (recordBtn.disabled) return;

    const now = new Date();
    const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    const basket_id = 'b_' + getDeviceId() + '_' + Date.now();
    const confirmed_at = now.toISOString();
    const totalQty = cart.reduce((s, i) => s + i.qty, 0);
    const items = cart.map(c => ({
      transaction_id: generateId('tx'),
      product_id: c.id,
      product_name: c.name,
      quantity: c.qty,
      recorder: recorder,
    }));

    // ボタンを一時的に無効化(連打防止)
    recordBtn.disabled = true;
    const originalText = recordBtn.textContent;
    recordBtn.textContent = '送信中...';

    try {
      await sendToServer('addBasket', {
        data: { basket_id: basket_id, confirmed_at: confirmed_at, items: items, note: '' }
      });
      // 成功:UI更新
      recentBaskets.unshift({
        basketId: basket_id,
        time: timeStr,
        items: cart.map(c => ({ id: c.id, name: c.name, qty: c.qty })),
        recorder: recorder,
        confirmed_at: confirmed_at,
      });
      saveRecent(recentBaskets);
      cart = [];
      renderAll();
      showSnackbar('✓ ' + totalQty + '点 記録しました');
    } catch (err) {
      // 失敗:カートはそのまま、エラー通知
      recordBtn.disabled = false;
      recordBtn.textContent = originalText;
      showSnackbar('⚠️ 送信失敗 ' + err.message + ' (もう一度押してください)', 'error');
    }
  }

  function showSnackbar(text, type) {
    const sb = document.getElementById('snackbar');
    sb.textContent = text;
    sb.classList.remove('error');
    if (type === 'error') sb.classList.add('error');
    sb.classList.add('show');
    const duration = type === 'error' ? 3500 : 2000;
    setTimeout(() => sb.classList.remove('show'), duration);
  }

  // ==========================================================
  // basket編集モーダル
  // ==========================================================
  function openBasketEditModal(basketId) {
    const basket = recentBaskets.find(b => b.basketId === basketId);
    if (!basket) return;
    editingBasket = {
      basketId: basket.basketId,
      items: basket.items.map(i => ({ id: i.id, name: i.name, qty: i.qty })),
      original_items: basket.items.map(i => ({ id: i.id, name: i.name, qty: i.qty })),
    };
    renderBasketEdit();
    document.getElementById('basketEditOverlay').classList.add('open');
  }

  function renderBasketEdit() {
    if (!editingBasket) return;
    const container = document.getElementById('basketEditItems');
    const totalQty = editingBasket.items.reduce((s, i) => s + i.qty, 0);
    document.getElementById('basketEditTitle').textContent = '記録を編集(' + totalQty + '点)';
    container.innerHTML = editingBasket.items.map(item =>
      '<div class="cart-item" style="background:#FFFFFF; margin-bottom:6px;">' +
        '<div class="cart-item-name">' + item.name + '</div>' +
        '<button class="qty-btn minus" data-bedit="minus" data-id="' + item.id + '">−</button>' +
        '<div class="qty-display">' + item.qty + '</div>' +
        '<button class="qty-btn plus" data-bedit="plus" data-id="' + item.id + '">+</button>' +
        '<button class="remove-btn" data-bedit="remove" data-id="' + item.id + '">×</button>' +
      '</div>'
    ).join('');
    if (editingBasket.items.length === 0) {
      container.innerHTML = '<div style="padding:16px; text-align:center; color:#b0a090; font-size:12px;">全て削除されました<br>「保存」で記録を削除します</div>';
    }
    container.querySelectorAll('[data-bedit]').forEach(btn => {
      btn.addEventListener('click', () => handleBasketEditAction(btn.dataset.bedit, btn.dataset.id));
    });
  }

  function handleBasketEditAction(action, productId) {
    const item = editingBasket.items.find(i => i.id === productId);
    if (!item) return;
    if (action === 'plus') item.qty += 1;
    else if (action === 'minus') {
      item.qty -= 1;
      if (item.qty <= 0) editingBasket.items = editingBasket.items.filter(i => i.id !== productId);
    } else if (action === 'remove') {
      editingBasket.items = editingBasket.items.filter(i => i.id !== productId);
    }
    renderBasketEdit();
  }

  function closeBasketEditModal() {
    document.getElementById('basketEditOverlay').classList.remove('open');
    editingBasket = null;
  }

  async function saveBasketEdit() {
    if (!editingBasket) return;
    if (editingBasket.items.length === 0) { deleteBasket(); return; }
    const basket = recentBaskets.find(b => b.basketId === editingBasket.basketId);
    if (!basket) return;

    const saveBtn = document.getElementById('basketEditSaveBtn');
    saveBtn.disabled = true;
    const origText = saveBtn.textContent;
    saveBtn.textContent = '送信中...';

    try {
      await sendToServer('modifyBasket', {
        data: {
          basket_id: editingBasket.basketId,
          action: 'modify',
          original_items: editingBasket.original_items.map(i => ({ product_id: i.id, product_name: i.name, quantity: i.qty })),
          modified_items: editingBasket.items.map(i => ({ product_id: i.id, product_name: i.name, quantity: i.qty })),
          modified_at: new Date().toISOString(),
          recorder: recorder,
        }
      });
      basket.items = editingBasket.items.map(i => ({ id: i.id, name: i.name, qty: i.qty }));
      saveRecent(recentBaskets);
      renderAll();
      closeBasketEditModal();
      showSnackbar('記録を修正しました');
    } catch (err) {
      saveBtn.disabled = false;
      saveBtn.textContent = origText;
      showSnackbar('⚠️ 修正失敗 ' + err.message, 'error');
    }
  }

  async function deleteBasket() {
    if (!editingBasket) return;
    if (!confirm('この記録を削除しますか?\n※データには「削除済」として残ります')) return;

    const delBtn = document.getElementById('basketEditDeleteBtn');
    delBtn.disabled = true;

    try {
      await sendToServer('modifyBasket', {
        data: {
          basket_id: editingBasket.basketId,
          action: 'delete',
          original_items: editingBasket.original_items.map(i => ({ product_id: i.id, product_name: i.name, quantity: i.qty })),
          modified_at: new Date().toISOString(),
          recorder: recorder,
        }
      });
      recentBaskets = recentBaskets.filter(b => b.basketId !== editingBasket.basketId);
      saveRecent(recentBaskets);
      renderAll();
      closeBasketEditModal();
      showSnackbar('記録を削除しました');
    } catch (err) {
      delBtn.disabled = false;
      showSnackbar('⚠️ 削除失敗 ' + err.message, 'error');
    }
  }

  // ==========================================================
  // 商品管理

  async function handleAdminAction(action, id) {
    const idx = PRODUCTS.findIndex(p => p.id === id);
    if (idx === -1) return;
    const product = PRODUCTS[idx];

    if (action === 'up' && idx > 0) {
      const tmp = PRODUCTS[idx - 1]; PRODUCTS[idx - 1] = PRODUCTS[idx]; PRODUCTS[idx] = tmp;
      PRODUCTS.forEach((p, i) => { p.display_order = i + 1; });
      saveProducts(PRODUCTS);
      renderAdminList();
      try {
        await sendToServer('reorderProducts', {
          data: PRODUCTS.map((p, i) => ({ id: p.id, display_order: i + 1 }))
        });
        await fetchMasters(false); // Sheetsから最新を再取得
        renderAdminList();
      } catch (err) { showSnackbar('⚠️ 並び替え失敗 ' + err.message, 'error'); }
    } else if (action === 'down' && idx < PRODUCTS.length - 1) {
      const tmp = PRODUCTS[idx + 1]; PRODUCTS[idx + 1] = PRODUCTS[idx]; PRODUCTS[idx] = tmp;
      PRODUCTS.forEach((p, i) => { p.display_order = i + 1; });
      saveProducts(PRODUCTS);
      renderAdminList();
      try {
        await sendToServer('reorderProducts', {
          data: PRODUCTS.map((p, i) => ({ id: p.id, display_order: i + 1 }))
        });
        await fetchMasters(false);
        renderAdminList();
      } catch (err) { showSnackbar('⚠️ 並び替え失敗 ' + err.message, 'error'); }
    } else if (action === 'toggle') {
      product.active = !product.active;
      saveProducts(PRODUCTS);
      renderAdminList();
      try {
        await sendToServer('upsertProduct', { data: { id: product.id, name: product.name, active: product.active } });
        await fetchMasters(false);
        renderAdminList();
      } catch (err) {
        product.active = !product.active;
        saveProducts(PRODUCTS);
        renderAdminList();
        showSnackbar('⚠️ 切替失敗 ' + err.message, 'error');
      }
    } else if (action === 'edit') {
      openEditModal(product);
    } else if (action === 'delete') {
      if (confirm('「' + product.name + '」を削除しますか?\n\n※過去の記録データは残ります')) {
        try {
          await sendToServer('deleteProduct', { productId: id });
          await fetchMasters(false); // Sheetsから最新を再取得して、削除が確実に反映されたことを確認
          renderAdminList();
          showSnackbar('削除しました');
        } catch (err) {
          showSnackbar('⚠️ 削除失敗 ' + err.message, 'error');
        }
      }
    }
  }

  function openEditModal(product) {
    editingProductId = product ? product.id : null;
    document.getElementById('editModalTitle').textContent = product ? '商品を編集' : '商品を追加';
    document.getElementById('editNameInput').value = product ? product.name : '';
    document.getElementById('editModalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('editNameInput').focus(), 100);
  }
  function closeEditModal() {
    document.getElementById('editModalOverlay').classList.remove('open');
    editingProductId = null;
  }
  async function saveProduct() {
    const name = document.getElementById('editNameInput').value.trim();
    if (!name) { alert('商品名を入力してください'); return; }
    const saveBtn = document.getElementById('editSaveBtn');
    saveBtn.disabled = true;
    const origText = saveBtn.textContent;
    saveBtn.textContent = '送信中...';

    try {
      if (editingProductId === null) {
        const id = 'p_' + Date.now();
        const maxOrder = PRODUCTS.reduce((m, p) => Math.max(m, p.display_order || 0), 0);
        const newProduct = { id: id, name: name, active: true, display_order: maxOrder + 1 };
        await sendToServer('upsertProduct', { data: newProduct });
      } else {
        const product = PRODUCTS.find(p => p.id === editingProductId);
        if (product) {
          await sendToServer('upsertProduct', { data: { id: product.id, name: name, active: product.active } });
        }
      }
      await fetchMasters(false); // Sheetsから最新を取得
      closeEditModal();
      renderAdminList();
    } catch (err) {
      saveBtn.disabled = false;
      saveBtn.textContent = origText;
      showSnackbar('⚠️ 保存失敗 ' + err.message, 'error');
    }
  }

        '<button class="admin-icon-btn" data-raction="edit" data-id="' + r.id + '">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>' +
        '</button>' +
        '<button class="admin-icon-btn danger" data-raction="delete" data-id="' + r.id + '">' +
          '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>' +
        '</button>' +
      '</div>'
    ).join('');
    list.querySelectorAll('[data-raction]').forEach(btn => {
      btn.addEventListener('click', () => handleRecorderAdminAction(btn.dataset.raction, btn.dataset.id));
    });
  }

  async function handleRecorderAdminAction(action, id) {
    const idx = RECORDERS.findIndex(r => r.id === id);
    if (idx === -1) return;
    const rec = RECORDERS[idx];

    if (action === 'up' && idx > 0) {
      const tmp = RECORDERS[idx - 1]; RECORDERS[idx - 1] = RECORDERS[idx]; RECORDERS[idx] = tmp;
      RECORDERS.forEach((r, i) => { r.display_order = i + 1; });
      saveRecorders(RECORDERS);
      renderRecorderAdminList();
      try {
        await sendToServer('reorderRecorders', {
          data: RECORDERS.map((r, i) => ({ id: r.id, display_order: i + 1 }))
        });
        await fetchMasters(false);
        renderRecorderAdminList();
      } catch (err) { showSnackbar('⚠️ 並び替え失敗 ' + err.message, 'error'); }
    } else if (action === 'down' && idx < RECORDERS.length - 1) {
      const tmp = RECORDERS[idx + 1]; RECORDERS[idx + 1] = RECORDERS[idx]; RECORDERS[idx] = tmp;
      RECORDERS.forEach((r, i) => { r.display_order = i + 1; });
      saveRecorders(RECORDERS);
      renderRecorderAdminList();
      try {
        await sendToServer('reorderRecorders', {
          data: RECORDERS.map((r, i) => ({ id: r.id, display_order: i + 1 }))
        });
        await fetchMasters(false);
        renderRecorderAdminList();
      } catch (err) { showSnackbar('⚠️ 並び替え失敗 ' + err.message, 'error'); }
    } else if (action === 'toggle') {
      rec.active = !rec.active;
      saveRecorders(RECORDERS);
      renderRecorderAdminList();
      try {
        await sendToServer('upsertRecorder', { data: { id: rec.id, name: rec.name, active: rec.active } });
        await fetchMasters(false);
        renderRecorderAdminList();
      } catch (err) {
        rec.active = !rec.active;
        saveRecorders(RECORDERS);
        renderRecorderAdminList();
        showSnackbar('⚠️ 切替失敗 ' + err.message, 'error');
      }
    } else if (action === 'edit') {
      openRecorderEditModal(rec);
    } else if (action === 'delete') {
      if (confirm('「' + rec.name + '」を削除しますか?\n\n※過去の記録データは残ります')) {
        try {
          await sendToServer('deleteRecorder', { recorderId: id });
          await fetchMasters(false);
          renderRecorderAdminList();
          showSnackbar('削除しました');
        } catch (err) {
          showSnackbar('⚠️ 削除失敗 ' + err.message, 'error');
        }
      }
    }
  }

  function openRecorderEditModal(rec) {
    editingRecorderId = rec ? rec.id : null;
    document.getElementById('recorderEditModalTitle').textContent = rec ? '記録者を編集' : '記録者を追加';
    document.getElementById('recorderEditNameInput').value = rec ? rec.name : '';
    document.getElementById('recorderEditModalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('recorderEditNameInput').focus(), 100);
  }
  function closeRecorderEditModal() {
    document.getElementById('recorderEditModalOverlay').classList.remove('open');
    editingRecorderId = null;
  }
  async function saveRecorderEdit() {
    const name = document.getElementById('recorderEditNameInput').value.trim();
    if (!name) { alert('名前を入力してください'); return; }
    const saveBtn = document.getElementById('recorderEditSaveBtn');
    saveBtn.disabled = true;
    const origText = saveBtn.textContent;
    saveBtn.textContent = '送信中...';

    try {
      let oldName = null;
      if (editingRecorderId === null) {
        const id = 'r_' + Date.now();
        const maxOrder = RECORDERS.reduce((m, r) => Math.max(m, r.display_order || 0), 0);
        const newRec = { id: id, name: name, active: true, display_order: maxOrder + 1 };
        await sendToServer('upsertRecorder', { data: newRec });
      } else {
        const rec = RECORDERS.find(r => r.id === editingRecorderId);
        if (rec) {
          oldName = rec.name;
          await sendToServer('upsertRecorder', { data: { id: rec.id, name: name, active: rec.active } });
          if (oldName === recorder) {
            recorder = name;
            saveRecorder(recorder);
          }
        }
      }
      await fetchMasters(false);
      closeRecorderEditModal();
      renderRecorderAdminList();
    } catch (err) {
      saveBtn.disabled = false;
      saveBtn.textContent = origText;
      showSnackbar('⚠️ 保存失敗 ' + err.message, 'error');
    }
  }

  // ==========================================================
  // イベントリスナー
  // ==========================================================
  document.getElementById('recordBtn').addEventListener('click', confirmBasket);
  document.getElementById('recentToggle').addEventListener('click', () => {
    recentExpanded = !recentExpanded;
    renderRecent();
  });
  document.getElementById('menuBtn').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.add('open');
  });
  document.getElementById('menuOverlay').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('open');
  });
  document.getElementById('menuCloseBtn').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('open');
  });

  // 集計画面
  document.getElementById('summaryBtn').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('open');
    openSummary(false);
  });
  document.getElementById('summaryCloseBtn').addEventListener('click', closeSummary);

  document.getElementById('endBtn').addEventListener('click', async () => {
    if (!confirm('営業終了しますか?')) return;
    document.getElementById('menuOverlay').classList.remove('open');

    const endBtn = document.getElementById('endBtn');
    endBtn.disabled = true;
    try {
      await sendToServer('markBusinessEnd', {});
      // 営業終了後に集計画面を自動表示
      openSummary(true);
    } catch (err) {
      showSnackbar('⚠️ 営業終了の記録失敗 ' + err.message, 'error');
    } finally {
      endBtn.disabled = false;
    }
  });

  // 商品管理
  document.getElementById('adminBtn').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('open');
    document.getElementById('adminScreen').classList.add('open');
    renderAdminList();
  });
  document.getElementById('adminCloseBtn').addEventListener('click', () => {
    document.getElementById('adminScreen').classList.remove('open');
    renderAll();
  });
  document.getElementById('addProductBtn').addEventListener('click', () => openEditModal(null));
  document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
  document.getElementById('editSaveBtn').addEventListener('click', saveProduct);
  document.getElementById('editModalOverlay').addEventListener('click', closeEditModal);

  // 記録者管理
  document.getElementById('recorderAdminBtn').addEventListener('click', () => {
    document.getElementById('menuOverlay').classList.remove('open');
    document.getElementById('recorderAdminScreen').classList.add('open');
    renderRecorderAdminList();
  });
  document.getElementById('recorderAdminCloseBtn').addEventListener('click', () => {
    document.getElementById('recorderAdminScreen').classList.remove('open');
    renderAll();
  });
  document.getElementById('addRecorderBtn').addEventListener('click', () => openRecorderEditModal(null));
  document.getElementById('recorderEditCancelBtn').addEventListener('click', closeRecorderEditModal);
  document.getElementById('recorderEditSaveBtn').addEventListener('click', saveRecorderEdit);
  document.getElementById('recorderEditModalOverlay').addEventListener('click', closeRecorderEditModal);

  // basket編集
  document.getElementById('basketEditOverlay').addEventListener('click', closeBasketEditModal);
  document.getElementById('basketEditCancelBtn').addEventListener('click', closeBasketEditModal);
  document.getElementById('basketEditSaveBtn').addEventListener('click', saveBasketEdit);
  document.getElementById('basketEditDeleteBtn').addEventListener('click', deleteBasket);

  // ネットワーク状態
  window.addEventListener('online', () => {
    updateSyncStatus();
    fetchMasters(false);
  });
  window.addEventListener('offline', updateSyncStatus);

  // 画面復帰時(他アプリから戻った/タブをアクティブにした)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && navigator.onLine) {
      fetchMasters(false);
    }
  });

  // 定期更新(5分おき:マスタ再取得)
  setInterval(() => {
    if (navigator.onLine) fetchMasters(false);
  }, 5 * 60 * 1000);

  // 手動更新ボタン
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    document.getElementById('menuOverlay').classList.remove('open');
    showSnackbar('更新中...');
    await fetchMasters(true);
  });

  // 同期バッジ:タップでマスタ更新
  document.getElementById('syncBadge').addEventListener('click', () => {
    if (!navigator.onLine) {
      showSnackbar('オフラインです');
      return;
    }
    fetchMasters(true);
  });

  // ==========================================================
  // 初期化
  // ==========================================================
  // ==========================================================
  // 集計画面
  // ==========================================================
  async function openSummary(isEndOfDay) {
    document.getElementById('summaryScreen').classList.add('open');
    const titleEl = document.getElementById('summaryTitle');
    const body = document.getElementById('summaryBody');
    titleEl.textContent = isEndOfDay ? 'おつかれさまでした' : '本日の集計';
    body.innerHTML = '<div class="summary-empty">読み込み中...</div>';

    let baskets = recentBaskets;
    let dataSource = 'local';
    let weather = null;

    if (navigator.onLine) {
      try {
        const res = await jsonpCall('getTodayBaskets');
        if (res && res.ok && Array.isArray(res.baskets)) {
          baskets = res.baskets.map(b => {
            const t = new Date(b.confirmed_at);
            const timeStr = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
            return {
              basketId: b.basket_id,
              time: timeStr,
              items: b.items.map(i => ({ name: i.name, qty: i.qty })),
              recorder: b.recorder,
              confirmed_at: b.confirmed_at,
            };
          });
          dataSource = 'sheet';
        }
      } catch (err) {
        console.warn('Sheets集計取得失敗、ローカルデータで代用:', err);
      }
      // 天気サマリーも取得
      try {
        const wres = await jsonpCall('getTodayWeatherSummary');
        if (wres && wres.ok && wres.hasData) {
          weather = wres.summary;
        }
      } catch (err) {
        console.warn('天気サマリー取得失敗:', err);
      }
    }

    renderSummary(isEndOfDay, baskets, dataSource, weather);
  }
  function closeSummary() {
    document.getElementById('summaryScreen').classList.remove('open');
  }

  function renderSummary(isEndOfDay, baskets, dataSource, weather) {
    const titleEl = document.getElementById('summaryTitle');
    const body = document.getElementById('summaryBody');
    titleEl.textContent = isEndOfDay ? 'おつかれさまでした' : '本日の集計';

    if (!baskets || baskets.length === 0) {
      body.innerHTML = '<div class="summary-empty">本日の記録はまだありません<br>記録を始めると、ここに集計が表示されます</div>';
      return;
    }

    // 集計
    const totalBaskets = baskets.length;
    const totalItems = baskets.reduce((s, b) => s + b.items.reduce((ss, i) => ss + i.qty, 0), 0);
    const avgItemsPerBasket = (totalItems / totalBaskets).toFixed(1);

    // 営業時間の算出
    const times = baskets.map(b => b.confirmed_at ? new Date(b.confirmed_at) : null).filter(Boolean);
    let timeRangeStr = '—';
    let durationStr = '—';
    if (times.length > 0) {
      const min = new Date(Math.min(...times.map(t => t.getTime())));
      const max = new Date(Math.max(...times.map(t => t.getTime())));
      const fmt = (d) => String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      timeRangeStr = fmt(min) + ' 〜 ' + fmt(max);
      const diffMin = Math.round((max - min) / 60000);
      const h = Math.floor(diffMin / 60);
      const m = diffMin % 60;
      durationStr = (h > 0 ? h + '時間' : '') + (m + '分');
    }

    // 商品別集計
    const productMap = {};
    baskets.forEach(b => {
      b.items.forEach(i => {
        if (!productMap[i.name]) productMap[i.name] = 0;
        productMap[i.name] += i.qty;
      });
    });
    const productRanking = Object.keys(productMap)
      .map(name => ({ name: name, qty: productMap[name] }))
      .sort((a, b) => b.qty - a.qty);
    const maxProductQty = productRanking[0] ? productRanking[0].qty : 1;

    // 時間帯別集計(0-23時)
    const hourlyCounts = new Array(24).fill(0);
    baskets.forEach(b => {
      if (!b.confirmed_at) return;
      const h = new Date(b.confirmed_at).getHours();
      const qty = b.items.reduce((s, i) => s + i.qty, 0);
      hourlyCounts[h] += qty;
    });
    let firstHour = -1, lastHour = -1;
    for (let h = 0; h < 24; h++) {
      if (hourlyCounts[h] > 0) {
        if (firstHour === -1) firstHour = h;
        lastHour = h;
      }
    }
    const maxHourly = Math.max(...hourlyCounts, 1);

    let html = '';

    if (isEndOfDay) {
      const today = new Date();
      const days = ['日','月','火','水','木','金','土'];
      const dateStr = (today.getMonth()+1) + '月' + today.getDate() + '日(' + days[today.getDay()] + ')';
      html += '<div class="summary-greeting">' +
        '<div class="summary-greeting-title">おつかれさまでした 🌙</div>' +
        '<div class="summary-greeting-sub">' + dateStr + ' の営業を終了しました</div>' +
      '</div>';
    }

    // データソース表示(ローカルだけの場合は警告)
    if (dataSource === 'local') {
      html += '<div style="background:rgba(217,97,78,0.08); border:1px solid rgba(217,97,78,0.2); border-radius:12px; padding:10px 12px; margin-bottom:12px; font-size:12px; color:var(--red); text-align:center;">' +
        'オフラインのため、この端末の記録のみ表示しています' +
      '</div>';
    }

    // A. 基本サマリー
    html += '<div class="summary-card">' +
      '<div class="summary-card-title">本日の概要</div>' +
      '<div class="stat-grid">' +
        '<div class="stat-cell">' +
          '<div class="stat-cell-label">basket数</div>' +
          '<div class="stat-cell-value">' + totalBaskets + '<span class="stat-cell-unit">組</span></div>' +
        '</div>' +
        '<div class="stat-cell">' +
          '<div class="stat-cell-label">総杯数</div>' +
          '<div class="stat-cell-value">' + totalItems + '<span class="stat-cell-unit">杯</span></div>' +
        '</div>' +
        '<div class="stat-cell">' +
          '<div class="stat-cell-label">1組あたり</div>' +
          '<div class="stat-cell-value">' + avgItemsPerBasket + '<span class="stat-cell-unit">杯</span></div>' +
        '</div>' +
        '<div class="stat-cell">' +
          '<div class="stat-cell-label">営業時間</div>' +
          '<div class="stat-cell-value" style="font-size:18px;">' + durationStr + '</div>' +
          '<div class="stat-cell-label" style="margin-top:2px; font-size:10px;">' + timeRangeStr + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

    // B. 商品ランキング
    html += '<div class="summary-card">' +
      '<div class="summary-card-title">商品ランキング</div>';
    productRanking.forEach((p, idx) => {
      const pct = ((p.qty / totalItems) * 100).toFixed(0);
      const barWidth = (p.qty / maxProductQty) * 100;
      html += '<div class="ranking-row ' + (idx === 0 ? 'top1' : '') + '">' +
        '<div class="ranking-rank">' + (idx + 1) + '</div>' +
        '<div class="ranking-name">' + p.name + '</div>' +
        '<div class="ranking-bar-wrap"><div class="ranking-bar" style="width:' + barWidth + '%;"></div></div>' +
        '<div class="ranking-qty">' + p.qty + '杯<span class="pct">(' + pct + '%)</span></div>' +
      '</div>';
    });
    html += '</div>';

    // C. 時間帯分布
    html += '<div class="summary-card">' +
      '<div class="summary-card-title">時間帯分布</div>';
    if (firstHour === -1) {
      html += '<div class="hourly-empty">時刻データがありません</div>';
    } else {
      let peakHour = firstHour;
      for (let h = firstHour; h <= lastHour; h++) {
        if (hourlyCounts[h] > hourlyCounts[peakHour]) peakHour = h;
      }
      let chartHtml = '<div class="hourly-chart">';
      let labelsHtml = '<div class="hourly-labels">';
      for (let h = firstHour; h <= lastHour; h++) {
        const count = hourlyCounts[h];
        const heightPct = count > 0 ? (count / maxHourly) * 100 : 0;
        const isPeak = h === peakHour && count > 0;
        chartHtml += '<div class="hourly-bar-wrap">' +
          (count > 0 ? '<div class="hourly-bar-value">' + count + '</div>' : '<div class="hourly-bar-value">&nbsp;</div>') +
          '<div class="hourly-bar ' + (isPeak ? 'peak' : '') + '" style="height:' + heightPct + '%;"></div>' +
        '</div>';
        labelsHtml += '<div class="hourly-label">' + h + '</div>';
      }
      chartHtml += '</div>';
      labelsHtml += '</div>';
      html += chartHtml + labelsHtml;
      html += '<div style="margin-top:12px; font-size:11px; color:var(--label-tertiary); text-align:center;">' +
        'ピーク:' + peakHour + '時(' + hourlyCounts[peakHour] + '杯)' +
      '</div>';
    }
    html += '</div>';

    // D. 天気サマリー
    if (weather) {
      const tempRange = weather.tempMin && weather.tempMax
        ? weather.tempMin + '℃ 〜 ' + weather.tempMax + '℃'
        : '—';
      const rainStr = parseFloat(weather.totalRain) > 0
        ? weather.totalRain + ' mm'
        : 'なし';
      html += '<div class="summary-card">' +
        '<div class="summary-card-title">本日の天気</div>' +
        '<div class="stat-grid">' +
          '<div class="stat-cell">' +
            '<div class="stat-cell-label">天候</div>' +
            '<div class="stat-cell-value" style="font-size:18px;">' + weather.dominantLabel + '</div>' +
          '</div>' +
          '<div class="stat-cell">' +
            '<div class="stat-cell-label">気温(平均)</div>' +
            '<div class="stat-cell-value">' + (weather.tempAvg || '—') + '<span class="stat-cell-unit">℃</span></div>' +
          '</div>' +
          '<div class="stat-cell">' +
            '<div class="stat-cell-label">気温(最低〜最高)</div>' +
            '<div class="stat-cell-value" style="font-size:14px;">' + tempRange + '</div>' +
          '</div>' +
          '<div class="stat-cell">' +
            '<div class="stat-cell-label">降水量</div>' +
            '<div class="stat-cell-value" style="font-size:18px;">' + rainStr + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    body.innerHTML = html;
  }

  // ==========================================================
  // マスタ再取得(複数のトリガーから呼ばれる)
  // ==========================================================
  let isFetchingMasters = false;
  async function fetchMasters(showFeedback) {
    if (isFetchingMasters) return false;
    if (!navigator.onLine) {
      if (showFeedback) showSnackbar('オフラインです');
      return false;
    }
    isFetchingMasters = true;
    let updated = false;
    try {
      const res = await jsonpCall('getProducts');
      if (res && res.ok && Array.isArray(res.products)) {
        const newJson = JSON.stringify(res.products);
        if (newJson !== JSON.stringify(PRODUCTS)) {
          PRODUCTS = res.products;
          saveProducts(PRODUCTS);
          updated = true;
        }
      }
    } catch (err) {
      console.warn('商品マスタ取得失敗:', err);
    }
    try {
      const res = await jsonpCall('getRecorders');
      if (res && res.ok && Array.isArray(res.recorders)) {
        const newJson = JSON.stringify(res.recorders);
        if (newJson !== JSON.stringify(RECORDERS)) {
          RECORDERS = res.recorders;
          saveRecorders(RECORDERS);
          updated = true;
        }
      }
    } catch (err) {
      console.warn('記録者マスタ取得失敗:', err);
    }
    isFetchingMasters = false;
    if (updated) renderAll();
    if (showFeedback) {
      showSnackbar(updated ? '最新の状態に更新しました' : '既に最新です');
    }
    return updated;
  }

  async function initialize() {
    // 旧バージョンの腐ったキューがあれば自動削除(クリーンアップ)
    try { localStorage.removeItem('tally.sync_queue'); } catch(e) {}

    renderAll();
    if (navigator.onLine) {
      await fetchMasters(false);
    }
  }

  initialize();
</script>
